# 02-secret.yaml
# WHY: Secrets store sensitive data (passwords, tokens) separately from config.
# They are base64-encoded (NOT encrypted by default — use encryption at rest in production).
# 
# HOW TO GENERATE YOUR OWN BASE64 VALUES:
#   echo -n "your_value_here" | base64
#
# Values below decode to:
#   DB_PASSWORD    -> BankSecurePass2024!
#   JWT_SECRET     -> jwt-super-secret-key-banking-2024-production
#   DOCKERHUB_USER -> yourusername   (REPLACE with your real Docker Hub username)
#   DOCKERHUB_PASS -> yourpassword   (REPLACE with your real Docker Hub password)
#
# To create your own encoded values:
#   echo -n "BankSecurePass2024!" | base64   → QmFua1NlY3VyZVBhc3MyMDI0IQ==
#   echo -n "your_dockerhub_password" | base64

---
# Secret 1: Application credentials (DB password + JWT secret)
apiVersion: v1
kind: Secret
metadata:
  name: banking-secrets
  namespace: banking
type: Opaque
data:
  # DB_PASSWORD = "BankSecurePass2024!"
  DB_PASSWORD: QmFua1NlY3VyZVBhc3MyMDI0IQ==
  # JWT_SECRET = "jwt-super-secret-key-banking-2024-production"
  JWT_SECRET: and3dC1zdXBlci1zZWNyZXQta2V5LWJhbmtpbmctMjAyNC1wcm9kdWN0aW9u

---
# Secret 2: Docker Hub registry credentials
# WHY: Kubernetes needs these to pull your private Docker images from Docker Hub.
# After creating this secret, reference it as imagePullSecrets in Deployments.
apiVersion: v1
kind: Secret
metadata:
  name: dockerhub-secret
  namespace: banking
type: kubernetes.io/dockerconfigjson
data:
  # IMPORTANT: Generate this with the real command below (replace placeholders):
  # kubectl create secret docker-registry dockerhub-secret \
  #   --docker-server=https://index.docker.io/v1/ \
  #   --docker-username=YOUR_DOCKERHUB_USERNAME \
  #   --docker-password=YOUR_DOCKERHUB_PASSWORD \
  #   --docker-email=your@email.com \
  #   -n banking --dry-run=client -o yaml
  # Then copy the .dockerconfigjson value from the output into this file.
  # Placeholder (will fail — must be replaced with real generated value):
  .dockerconfigjson: eyJhdXRocyI6eyJodHRwczovL2luZGV4LmRvY2tlci5pby92MS8iOnsidXNlcm5hbWUiOiJZT1VSX1VTRVJOQU1FIiwicGFzc3dvcmQiOiJZT1VSX1BBU1NXT1JEIiwiYXV0aCI6Ilc0M2E1VnBlVGVTdEhvc3Q2VTNiVjZTa05BY29Xcmg2WFVxSXhISkFhT0hSWjFsVmE1UmhVeEVQcVoxSHlKU2lSbXh2R0pwbEdXUjVKcTFSUHJOWXhiYXRpb24ifX19
